<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DungeonRPG">
  <meta name="theme-color" content="#080810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dungeon Chronicles</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Crimson Pro','Times New Roman',serif;background-color:#080810;color:#e8d5b7;overflow:hidden;-webkit-text-size-adjust:100%}
#app{height:100svh;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px)}
/* HEADER */
#header-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 9px 3px;background-color:#0c0c18;border-bottom:1px solid #3a2a1a;flex-shrink:0}
.title-text{font-family:'IM Fell English',serif;font-size:13px;color:#c9a227;letter-spacing:1px;text-shadow:0 0 10px rgba(201,162,39,.5)}
.hdr-center{display:flex;align-items:center;gap:8px}
.location-badge{font-family:'IM Fell English',serif;font-size:11px;padding:2px 7px;border-radius:12px;letter-spacing:1px}
.location-badge.dungeon{background-color:#1a0c0c;color:#c72222;border:1px solid #441a1a}
.location-badge.town{background-color:#0c1a10;color:#22aa55;border:1px solid #1a4428}
.gold-badge{font-family:'IM Fell English',serif;font-size:11px;color:#c9a227;background-color:#14100a;border:1px solid #3a2a1a;border-radius:12px;padding:2px 7px}
.hdr-btn{width:30px;height:30px;background:none;border:1px solid #3a2a1a;border-radius:6px;color:#8a6a3a;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;position:relative;flex-shrink:0}
.hdr-btn:active{background-color:#1a1828}
.badge-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background-color:#e05555;border-radius:50%;border:1px solid #080810;display:none}
/* PARTY PANEL */
#party-panel{background-color:#0c0c18;border-bottom:2px solid #3a2a1a;padding:5px 7px;flex-shrink:0}
.party-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.member-card{background-color:#14121e;border:1px solid #2e2040;border-radius:7px;padding:4px 4px 3px;cursor:pointer;transition:border-color .25s}
.member-card:active{background-color:#1a1828}
.member-card.low-hp{border-color:#661122}
.member-card.dead{opacity:.4;filter:grayscale(80%)}
.member-card.lu-ready{border-color:#c9a227;box-shadow:0 0 5px rgba(201,162,39,.35)}
.member-top{display:flex;align-items:center;gap:2px;margin-bottom:3px}
.member-icon{font-size:11px;flex-shrink:0}
.member-name{font-family:'IM Fell English',serif;font-size:9px;color:#d4a84b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.member-lv{font-size:8px;color:#c9a227;flex-shrink:0}
.bar-wrap{margin-bottom:1px}
.bar-row{display:flex;justify-content:space-between;font-size:6px;color:#7a6a5a;margin-bottom:1px}
.bar-track{height:4px;background-color:#1e1c2c;border-radius:2px;overflow:hidden}
.hp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#7a0e0e,#c72222);transition:width .5s ease}
.mp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#0a0a7a,#1a5acc);transition:width .5s ease}
.exp-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#3a6a10,#7acc22);transition:width .5s ease}
.hp-fill.danger{background:linear-gradient(90deg,#550505,#aa1111)}
.sc{display:block;font-size:7px;text-align:center;padding:1px 2px;border-radius:3px;margin-top:2px;background-color:#1c2a18;color:#6aaa68;border:1px solid #2a4028}
.sc.poisoned{background-color:#221430;color:#cc55cc;border-color:#441a55}
.sc.burned{background-color:#2a1808;color:#dd7733;border-color:#553311}
.sc.frozen{background-color:#0a1830;color:#55aadd;border-color:#1a3d66}
.sc.stunned{background-color:#282216;color:#ddcc33;border-color:#5a4a10}
.sc.dead{background-color:#1e0c0c;color:#aa3333;border-color:#440e0e}
/* CHAT */
#chat-area{flex:1;overflow-y:auto;padding:10px 9px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch;background-image:radial-gradient(ellipse 60% 40% at 15% 60%,rgba(40,20,10,.3) 0%,transparent 70%),radial-gradient(ellipse 50% 30% at 85% 30%,rgba(15,10,40,.4) 0%,transparent 70%)}
#chat-area::-webkit-scrollbar{width:3px}
#chat-area::-webkit-scrollbar-thumb{background:#3a2a1a;border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:93%;animation:msgIn .22s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.narrator{align-self:flex-start}
.msg.player{align-self:flex-end}
.msg.system{align-self:center;max-width:100%}
.msg.town-narr{align-self:flex-start}
.msg-sender{font-family:'IM Fell English',serif;font-size:10px;color:#8a6a3a;margin-bottom:2px;padding-left:4px;letter-spacing:1px}
.msg.player .msg-sender{text-align:right;padding-right:4px;color:#4a6a9a}
.msg.town-narr .msg-sender{color:#22aa55}
.msg-bubble{padding:8px 12px;border-radius:10px;font-size:14px;line-height:1.65}
.msg.narrator .msg-bubble{background-color:#131222;border:1px solid #2e2040;border-left:3px solid #c9a227;color:#ead6b8;font-style:italic}
.msg.player .msg-bubble{background-color:#121c30;border:1px solid #243054;border-right:3px solid #3a6acc;color:#bcd0ee;text-align:right}
.msg.system .msg-bubble{background:none;color:#7a6a5a;font-size:12px;font-style:italic;text-align:center;padding:2px 6px}
.msg.town-narr .msg-bubble{background-color:#0e1a12;border:1px solid #1e3828;border-left:3px solid #22aa55;color:#c8e8d0}
.typing-wrap{display:flex;flex-direction:column;align-self:flex-start}
.typing-bubble{background-color:#131222;border:1px solid #2e2040;border-left:3px solid #c9a227;border-radius:10px;padding:9px 13px;display:flex;gap:5px;align-items:center}
.tdot{width:6px;height:6px;background-color:#c9a227;border-radius:50%;animation:tdot 1.3s infinite}
.tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,65%,100%{transform:translateY(0);opacity:.4}35%{transform:translateY(-5px);opacity:1}}
/* QUICK BAR */
#quick-bar{display:flex;gap:4px;padding:4px 9px 0;overflow-x:auto;flex-shrink:0;background-color:#0c0c18;-webkit-overflow-scrolling:touch}
#quick-bar::-webkit-scrollbar{display:none}
.qbtn{font-family:'IM Fell English',serif;font-size:11px;white-space:nowrap;padding:4px 9px;background-color:#14121e;border:1px solid #2e2040;border-radius:20px;color:#c9a227;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.qbtn:active{background-color:#1e1c30;border-color:#c9a227}
.qbtn.town-btn{color:#22aa55;border-color:#1a3828;background-color:#0e1810}
.qbtn.town-btn:active{background-color:#142018}
/* INPUT */
#input-panel{background-color:#0c0c18;border-top:2px solid #3a2a1a;padding:7px 9px 9px;flex-shrink:0}
.input-row{display:flex;gap:7px;align-items:flex-end}
#chat-input{flex:1;background-color:#14121e;border:1px solid #2e2040;border-radius:10px;color:#e8d5b7;font-family:'Crimson Pro',serif;font-size:16px;padding:8px 11px;resize:none;min-height:42px;max-height:100px;outline:none;-webkit-appearance:none;line-height:1.5}
#chat-input::placeholder{color:#4a3a2a}
#chat-input:focus{border-color:#c9a227}
#btn-send{width:42px;height:42px;background:linear-gradient(140deg,#8b6a10,#c9a227);border:none;border-radius:10px;color:#080810;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
#btn-send:disabled{opacity:.3;cursor:not-allowed}
#btn-send:active:not(:disabled){opacity:.75}
/* MODALS */
.moverlay{position:fixed;inset:0;background-color:rgba(4,4,12,.92);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0 0 env(safe-area-inset-bottom,0px)}
.moverlay.hidden{display:none}
.msheet{background-color:#0e0e1c;border:1px solid #3a2a1a;border-top:2px solid #c9a227;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:16px 15px 20px;-webkit-overflow-scrolling:touch}
.msheet.town-sheet{border-top-color:#22aa55}
.mhandle{width:40px;height:4px;background-color:#3a2a1a;border-radius:2px;margin:0 auto 12px}
.mtitle{font-family:'IM Fell English',serif;font-size:18px;color:#c9a227;text-align:center;letter-spacing:2px;margin-bottom:14px;text-shadow:0 0 10px rgba(201,162,39,.4)}
.mtitle.town{color:#22aa55;text-shadow:0 0 10px rgba(34,170,85,.4)}
.flabel{font-family:'IM Fell English',serif;font-size:12px;color:#c9a227;display:block;margin-bottom:4px;letter-spacing:1px}
.fhint{font-size:11px;color:#5a4a3a;margin-top:3px}
.fsec{margin-bottom:13px}
.finput{width:100%;background-color:#14121e;border:1px solid #2e2040;border-radius:8px;color:#e8d5b7;font-family:'Crimson Pro',serif;font-size:15px;padding:8px 10px;outline:none;-webkit-appearance:none}
.finput:focus{border-color:#c9a227}
select.finput{cursor:pointer}
textarea.finput{resize:vertical;line-height:1.5}
.mactions{display:flex;gap:8px;margin-top:18px}
.bok{flex:1;background:linear-gradient(140deg,#8b6a10,#c9a227);color:#080810;border:none;border-radius:10px;padding:11px;font-family:'IM Fell English',serif;font-size:14px;cursor:pointer;font-weight:bold;letter-spacing:1px}
.bok.green{background:linear-gradient(140deg,#1a6a30,#22aa55);color:#fff}
.bcancel{flex:1;background:none;color:#7a6a5a;border:1px solid #3a2a1a;border-radius:10px;padding:11px;font-family:'IM Fell English',serif;font-size:14px;cursor:pointer}
.danger-link{display:block;text-align:center;font-size:12px;color:#883333;background:none;border:none;cursor:pointer;margin-top:12px;text-decoration:underline}
.divider{height:1px;background-color:#2e2040;margin:12px 0}
.tab-bar{display:flex;gap:4px;margin-bottom:11px}
.tab-btn{flex:1;padding:6px;background-color:#14121e;border:1px solid #2e2040;border-radius:7px;color:#7a6a5a;font-family:'IM Fell English',serif;font-size:11px;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.tab-btn.active{background-color:#1e1c30;border-color:#c9a227;color:#c9a227}
.tab-btn.tactive{background-color:#0e1810;border-color:#22aa55;color:#22aa55}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:5px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 6px;background-color:#1a1828;border-radius:4px}
.skey{color:#8a7a6a}.sval{color:#e8d5b7;font-weight:600}
/* LU */
.lu-rem{text-align:center;font-size:13px;color:#8aaa6a;margin-bottom:12px}
.lu-row{display:flex;align-items:center;padding:7px 9px;background-color:#14121e;border:1px solid #2e2040;border-radius:8px;margin-bottom:5px}
.lu-name{font-family:'IM Fell English',serif;font-size:13px;color:#d4a84b;width:38px}
.lu-desc{font-size:10px;color:#5a4a3a;flex:1;padding:0 7px}
.lu-val{font-size:14px;color:#e8d5b7;width:26px;text-align:center}
.lu-btn{width:26px;height:26px;background:none;border:1px solid #3a2a1a;border-radius:5px;color:#c9a227;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.lu-btn:disabled{opacity:.3;cursor:default}
.lu-btn:active:not(:disabled){background-color:#1e1c30}
.auto-btn{width:100%;background-color:#1a1828;border:1px solid #2e2040;border-radius:8px;color:#8aaa6a;font-family:'IM Fell English',serif;font-size:12px;padding:8px;cursor:pointer;margin-bottom:9px}
/* EQUIP */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.eslot{background-color:#14121e;border:1px solid #2e2040;border-radius:8px;padding:7px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.eslot:active{background-color:#1e1c30}
.eslot-label{font-size:10px;color:#7a6a5a;margin-bottom:2px}
.eslot-item{font-size:12px;color:#d4a84b}
.eslot.empty .eslot-item{color:#3a3048;font-style:italic}
.eslot.unid .eslot-item{color:#9966cc}
.eslot-stats{font-size:9px;color:#5a4a3a;margin-top:1px}
/* ITEM LIST */
.ilist{max-height:200px;overflow-y:auto}
.irow{display:flex;align-items:center;justify-content:space-between;padding:8px 9px;background-color:#14121e;border:1px solid #2e2040;border-radius:7px;margin-bottom:4px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.irow:active{background-color:#1e1c30}
.irow.equipped{border-color:#c9a227}
.irow.unidentified{border-color:#663399}
.iname{font-size:13px;color:#d4a84b}
.iname.unid-color{color:#9966cc}
.istats{font-size:10px;color:#5a4a3a}
.iact{font-size:11px;color:#c9a227;font-family:'IM Fell English',serif;flex-shrink:0}
/* INVENTORY */
.inv-row{display:flex;align-items:center;justify-content:space-between;padding:8px 9px;background-color:#14121e;border:1px solid #2e2040;border-radius:7px;margin-bottom:4px}
.inv-name{font-size:13px;color:#d4a84b;flex:1}
.inv-qty{font-size:11px;color:#8a7a6a;margin:0 8px}
.inv-btns{display:flex;gap:5px}
.inv-btn{background:none;border:1px solid #3a2a1a;border-radius:5px;color:#c9a227;font-size:11px;padding:3px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.inv-btn:active{background-color:#1e1c30}
.inv-btn.red{color:#aa3333;border-color:#441a1a}
/* TOWN SERVICE */
.service-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background-color:#0e1810;border:1px solid #1a3828;border-radius:8px;margin-bottom:6px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.service-row:active{background-color:#142018}
.service-name{font-family:'IM Fell English',serif;font-size:14px;color:#c8e8d0}
.service-cost{font-size:12px;color:#c9a227}
.service-desc{font-size:11px;color:#4a6a5a;margin-top:2px}
/* BATTLE PANEL */
#battle-panel{flex-shrink:0;background-color:#0c0c18;border-bottom:1px solid #3a2a1a;padding:6px 8px;display:none}
#battle-panel.active{display:block}
.battle-chars{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.battle-char-btn{background-color:#14121e;border:1px solid #2e2040;border-radius:7px;padding:5px 4px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.battle-char-btn:active{background-color:#1e1c30}
.battle-char-btn.dead-char{opacity:.35;cursor:default;pointer-events:none}
.battle-char-btn.selected{border-color:#c9a227;background-color:#1a1828}
.bc-name{font-size:9px;color:#8a7a6a;margin-bottom:2px}
.bc-act{font-size:12px;color:#c9a227;font-family:'IM Fell English',serif}
.battle-confirm-row{display:flex;gap:5px}
.battle-confirm{flex:1;background:linear-gradient(140deg,#6a1010,#c72222);border:none;border-radius:8px;color:#fff;font-family:'IM Fell English',serif;font-size:14px;padding:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.battle-confirm:active{opacity:.8}
.battle-flee{background:none;border:1px solid #441a1a;border-radius:8px;color:#883333;font-family:'IM Fell English',serif;font-size:13px;padding:9px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.battle-flee:active{background-color:#1a1010}
/* RARITY COLORS */
.rarity-common{color:#d4a84b}.rarity-uncommon{color:#44aadd}.rarity-rare{color:#9966dd}.rarity-legendary{color:#dd8822}
/* PARTY CFG */
.pcrow{display:flex;gap:5px;margin-bottom:7px;align-items:center}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header-bar">
    <div class="title-text">DUNGEON CHRONICLES</div>
    <div class="hdr-center">
      <span class="location-badge dungeon" id="loc-badge">B1F</span>
      <span class="gold-badge" id="gold-badge">G: 0</span>
    </div>
    <div style="display:flex;gap:4px">
      <button class="hdr-btn" onclick="openBagModal()" title="所持品">&#x1F392;<span class="badge-dot" id="dot-bag"></span></button>
      <button class="hdr-btn" onclick="openEquipModal()" title="装備">&#x2694;</button>
      <button class="hdr-btn" onclick="openLvModal()" title="LV">LV<span class="badge-dot" id="dot-lv"></span></button>
      <button class="hdr-btn" onclick="openSettings()" title="設定">&#x2699;</button>
    </div>
  </div>

  <!-- PARTY -->

  <div id="party-panel"><div class="party-grid" id="party-grid"></div></div>

  <!-- CHAT -->

  <div id="chat-area"></div>

  <!-- QUICK BAR -->

  <!-- BATTLE PANEL (shown during combat) -->

  <div id="battle-panel">
    <div class="battle-chars" id="battle-chars-grid"></div>
    <div class="battle-confirm-row">
      <button class="battle-confirm" id="battle-confirm-btn">⚔️ 行動確定！</button>
      <button class="battle-flee" id="battle-flee-btn">💨 逃走</button>
    </div>
  </div>

  <div id="quick-bar"></div>

  <!-- INPUT -->

  <div id="input-panel">
    <div class="input-row">
      <textarea id="chat-input" rows="1" placeholder="行動を入力..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="btn-send" onclick="sendMsg()">&#x27A4;</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->

<div id="m-settings" class="moverlay hidden" onclick="ovClick(event,'m-settings')">
<div class="msheet"><div class="mhandle"></div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="stab('api',this)">API</button>
    <button class="tab-btn" onclick="stab('pty',this)">パーティ</button>
    <button class="tab-btn" onclick="stab('sys',this)">プロンプト</button>
  </div>
  <div id="st-api">
    <div class="fsec"><label class="flabel">プロバイダー</label>
      <select class="finput" id="sel-prov" onchange="provChange()">
        <option value="custom">カスタム (Gemini等)</option>
        <option value="openrouter">OpenRouter</option>
        <option value="openai">OpenAI</option>
      </select></div>
    <div class="fsec" id="grp-custom"><label class="flabel">カスタムURL</label>
      <input type="url" class="finput" id="inp-url" placeholder="https://generativelanguage.googleapis.com/v1beta/openai"></div>
    <div class="fsec"><label class="flabel">APIキー</label>
      <input type="password" class="finput" id="inp-key" placeholder="AIza... / sk-...">
      <div class="fhint">このデバイスのlocalStorageにのみ保存</div></div>
    <div class="fsec"><label class="flabel">ストーリー用モデル <span style="font-size:10px;color:#5a4a3a">（探索・イベント）</span></label>
      <input type="text" class="finput" id="inp-story-model" placeholder="gemini-2.5-flash">
      <div class="fhint">高品質モデル。例: gemini-2.5-flash</div></div>
    <div class="fsec"><label class="flabel">戦闘用モデル <span style="font-size:10px;color:#5a4a3a">（戦闘処理・RPD節約）</span></label>
      <input type="text" class="finput" id="inp-battle-model" placeholder="gemini-2.0-flash">
      <div class="fhint">高速モデル。例: gemini-2.0-flash（RPD上限が高い）</div></div>
  </div>
  <div id="st-pty" style="display:none"><div id="party-cfg"></div></div>
  <div id="st-sys" style="display:none"><textarea class="finput" id="inp-sys" rows="9"></textarea></div>
  <div class="mactions">
    <button class="bcancel" onclick="closeM('m-settings')">閉じる</button>
    <button class="bok" onclick="saveSetting()">保存</button>
  </div>
  <button style="width:100%;margin-top:10px;background:none;border:1px solid #2e4028;border-radius:8px;color:#4a9a6a;font-size:13px;padding:9px;cursor:pointer;font-family:'Crimson Pro',serif" onclick="testConnection()">🔌 接続テスト</button>
  <div id="test-result" style="font-size:12px;text-align:center;margin-top:6px;min-height:16px"></div>
  <button class="danger-link" onclick="doReset()">ゲームをリセット</button>
</div></div>

<!-- LEVEL UP MODAL -->

<div id="m-lu" class="moverlay hidden">

// ================================================================
// DERIVED STATS
// ================================================================
function calcD(m) {
  const B={str:0,mag:0,vit:0,spd:0,lck:0,atk:0,def:0,matk:0,mdef:0,hit:0,eva:0,hp:0,mp:0};
  SK.forEach(s=>{
    const item=IDATA[m.equip&&m.equip[s]];
    if(!item||!item.identified&&item.identified===false) return;
    ['str','mag','vit','spd','lck','atk','def','matk','mdef','hit','eva','hp','mp'].forEach(k=>{if(item[k]) B[k]+=item[k];});
  });
  const s=m.stats;
  return {
    maxHp: Math.floor(s.vit*12+m.level*5+50+B.hp),
    maxMp: Math.floor(s.mag*8+m.level*3+10+B.mp),
    atk:   Math.floor(s.str*2+B.atk+B.str),
    def:   Math.floor(s.vit+B.def+B.vit*0.5),
    matk:  Math.floor(s.mag*2+B.matk+B.mag),
    mdef:  Math.floor(s.mag+s.lck*0.5+B.mdef),
    hit:   Math.floor(s.spd+s.lck*0.5+B.hit),
    eva:   Math.floor(s.spd*1.5+s.lck*0.5+B.eva),
    crit:  Math.floor(s.lck*2)
  };
}

function makeMember(jobKey,id){
  const j=JOBS[jobKey];
  const base={str:8,mag:5,vit:8,spd:6,lck:5};
  if(jobKey==='warrior'){base.str+=4;base.vit+=4;}
  if(jobKey==='mage'){base.mag+=6;base.spd+=2;}
  if(jobKey==='priest'){base.mag+=4;base.vit+=2;base.lck+=2;}
  if(jobKey==='thief'){base.spd+=5;base.lck+=3;base.str+=2;}
  const m={id,name:j.name,icon:j.icon,jobKey,level:1,exp:0,expNext:100,pendingPoints:0,stats:{...base},equip:{...STARTER[jobKey]},status:'normal'};
  const d=calcD(m); m.hp=d.maxHp; m.mp=d.maxMp;
  return m;
}

function updateQuickBar(){
  const bar = document.getElementById('quick-bar');
  const bp  = document.getElementById('battle-panel');

  if(G.phase==='battle'){
    bar.innerHTML='';
    bp.classList.add('active');
    renderBattlePanel();
    return;
  }
  bp.classList.remove('active');

  const phaseKey = G.inTown?'town':G.phase;
  const acts = PHASE_ACTS[phaseKey] || PHASE_ACTS.explore;
  bar.innerHTML = acts.map(([,l],i)=>
    `<button class="qbtn${G.inTown?' town-btn':''}" data-idx="${i}">${l}</button>`
  ).join('');
  // Use event delegation to avoid quote escaping bug
  bar.onclick = (e)=>{
    const btn = e.target.closest('[data-idx]');
    if(!btn) return;
    const act = acts[parseInt(btn.dataset.idx)][0];
    handlePhaseAct(act);
  };
}

function renderBattlePanel(){
  const grid = document.getElementById('battle-chars-grid');
  const ACTS_ICON = {攻撃:'⚔️',魔法:'✨',防御:'🛡',道具:'🎒','---':'💀'};
  grid.innerHTML = G.party.map(m=>{
    const dead = m.status==='dead'||m.hp<=0;
    const act  = dead?'---':G.battleSel[m.id]||'攻撃';
    return `<div class="battle-char-btn ${dead?'dead-char':''}" data-mid="${m.id}">
      <div class="bc-name">${m.icon}${m.name}</div>
      <div class="bc-act">${ACTS_ICON[act]||''} ${act}</div>
    </div>`;
  }).join('');
  grid.onclick = (e)=>{
    const btn = e.target.closest('[data-mid]');
    if(!btn) return;
    const mid = parseInt(btn.dataset.mid);
    const m   = G.party.find(x=>x.id===mid);
    if(!m||m.status==='dead'||m.hp<=0) return;
    // Cycle through actions
    const avail=['攻撃','魔法','防御','道具'];
    const cur = G.battleSel[mid]||'攻撃';
    const ni  = (avail.indexOf(cur)+1)%avail.length;
    G.battleSel[mid] = avail[ni];
    renderBattlePanel();
  };
  // Confirm & flee buttons
  document.getElementById('battle-confirm-btn').onclick = confirmBattleAction;
  document.getElementById('battle-flee-btn').onclick = ()=>{
    G.phase='explore';updateQuickBar();
    const inp=document.getElementById('chat-input');inp.value='逃走を試みる！';autoResize(inp);sendMsg();
  };
}

function confirmBattleAction(){
  const parts = G.party.filter(m=>m.status!=='dead'&&m.hp>0).map(m=>`${m.name}:${G.battleSel[m.id]||'攻撃'}`);
  const text  = `【行動】${parts.join('、')}`;
  G.pendingCallType='battle';   // ★ mark as battle BEFORE phase reset
  G.skipBattleDetect=true;
  G.phase='explore';
  updateQuickBar();
  const inp=document.getElementById('chat-input');inp.value=text;autoResize(inp);sendMsg();
}

function handlePhaseAct(action){
  // Actions that should reset phase to explore after sending
  const PHASE_RESET_ACTIONS=[
    '宝箱を慎重に開ける','宝箱を素早く開ける','宝箱を放置する',
    '階段を降りる','階段を無視して探索を続ける',
    '転移陣を使って街へ帰還する','転移陣を無視して探索を続ける'
  ];
  if(PHASE_RESET_ACTIONS.includes(action)){
    G.phase='explore'; updateQuickBar();
  }
  // Manual battle mode toggle
  if(action==='[戦闘モード切替]'){
    G.phase= G.phase==='battle'?'explore':'battle';
    if(G.phase==='battle'){
      G.party.forEach(m=>{
        if(m.status!=='dead'&&m.hp>0){
          const j=JOBS[m.jobKey];
          if(j?.name==='魔法使い') G.battleSel[m.id]='魔法';
          else if(j?.name==='僧侶') G.battleSel[m.id]='回復';
          else G.battleSel[m.id]='攻撃';
        }
      });
    }
    updateQuickBar();
    return;
  }
  // Town special actions
  if(G.inTown){
    if(action==='宿屋で休む'){townInn();return;}
    if(action==='神殿で蘇生を頼む'){townTemple();return;}
    if(action==='鑑定屋へ行く'){closeM('m-tserv');showTownMenu();openM('m-tserv');return;}
    if(action==='武器屋へ行く'){townShop();openM('m-tserv');return;}
    if(action==='ダンジョンへ戻る'){leaveForDungeon();return;}
  }
  const inp=document.getElementById('chat-input');inp.value=action;autoResize(inp);sendMsg();
}

function updateBadges(){
  document.getElementById('dot-lv').style.display=G.party.some(m=>m.pendingPoints>0)?'block':'none';
  const unid=G.bag.filter(b=>b.type==='equip'&&b.identified===false).length;

}

// ================================================================
// STATUS UPDATE FROM AI
// ================================================================
function applyStatus(data){
  if(!data) return;

  // ── Phase transition from AI event ──
  const ev = (data.event||'exploration').toLowerCase();
  if(!G.inTown){
    if((ev==='battle'||ev==='boss') && !G.skipBattleDetect){
      G.phase='battle';
      // Init battle selections for alive members
      G.party.forEach(m=>{
        if(m.status!=='dead'&&m.hp>0){
          const j=JOBS[m.jobKey];
          if(j&&j.name==='魔法使い') G.battleSel[m.id]='魔法';
          else if(j&&j.name==='僧侶') G.battleSel[m.id]='回復';
          else if(j&&j.name==='盗賊') G.battleSel[m.id]='攻撃';
          else G.battleSel[m.id]='攻撃';
        }
      });
    } else if(ev==='exploration'||ev==='rest'||ev==='trap'){
      G.phase='explore';
    } else if(ev==='treasure' && !G.skipBattleDetect){
      G.phase='treasure';
    }
    // stairs/transfer override regardless
    if(data.stairsFound)  G.phase='stairs';
    if(data.transferCircleFound) G.phase='transfer';
    // Consume skipBattleDetect
    G.skipBattleDetect=false;
  }

  if(Array.isArray(data.party)){
    data.party.forEach(u=>{
      const m=G.party.find(x=>x.id===u.id);
      if(!m) return;
      if(u.hp!==undefined) m.hp=Math.max(0,u.hp);
      if(u.status) m.status=u.status;
    });
  }
  if(data.floor) G.floor=Math.max(1,Math.min(100,data.floor));
  if(G.floor>G.maxFloor) G.maxFloor=G.floor;

  // EXP
  if(data.expGained>0) G.party.forEach(m=>{if(m.status!=='dead') addExp(m,data.expGained);});

  // Gold
  if(data.goldGained>0){
    G.gold+=data.goldGained;
    pushSys(`G: +${data.goldGained}ゴールド入手！（所持: ${G.gold}G）`);
  }

  // Items dropped
  if(Array.isArray(data.itemsDropped) && data.itemsDropped.length>0){
    data.itemsDropped.forEach(drop=>{
      if(typeof drop==='string') addDrop(drop, false);
      else if(drop.id) addDrop(drop.id, !!drop.unidentified);
    });
  }

  // Floor down
  if(data.floorDown>0){
    G.floor=Math.min(100, G.floor+data.floorDown);
    if(G.floor>G.maxFloor) G.maxFloor=G.floor;
    pushSys(`階段を降りた。現在: B${G.floor}F`);
  }

  // Transfer circle
  if(data.transferCircleFound){
    pushSys('✨ 転移陣を発見！「転移」ボタンから街へ帰還できます。');
  }

  renderParty(); updateBadges(); updateHdr(); updateQuickBar();
}

function addDrop(id, unidentified){
  if(IDATA[id]){
    const item=IDATA[id];
    const uid=G.nextUid++;
    G.bag.push({type:'equip',id,identified:!unidentified,uid,slot:item.slot,r:item.r});
    if(unidentified){
      const slotLabel=SLOTS[item.slot]||item.slot;
      pushSys(`📦 未鑑定の${slotLabel}を入手（?? の何か）`);
    } else {
      pushSys(`📦 ${item.icon} ${item.n} を入手！`);
    }
  } else if(CDATA[id]){
    const existing=G.bag.find(b=>b.type==='consumable'&&b.id===id);
    if(existing) existing.qty++;
    else G.bag.push({type:'consumable',id,qty:1});
    pushSys(`📦 ${CDATA[id].icon} ${CDATA[id].n} を入手！`);
  }
}

function addExp(m,amt){m.exp+=amt;while(m.exp>=m.expNext){m.exp-=m.expNext;levelUp(m);}}
function levelUp(m){
  m.level++;m.expNext=Math.floor(m.expNext*1.4);
  const j=JOBS[m.jobKey];
  if(j){Object.entries(j.auto).forEach(([k,v])=>m.stats[k]+=v);m.pendingPoints+=j.pts;}
  else m.pendingPoints+=3;
  const d=calcD(m);m.hp=d.maxHp;m.mp=d.maxMp;
  pushSys(`⬆ ${m.name}がLv${m.level}にアップ！（LVボタンでステータスを割り振ろう）`);
}

let luAct=0,luTmp={};
function openLvModal(id){
  const ms=G.party.filter(m=>m.pendingPoints>0);

function renderLuTabs(){
  document.getElementById('lu-tabs').innerHTML=G.party.filter(m=>m.pendingPoints>0).map(m=>
    `<button class="tab-btn ${m.id===luAct?'active':''}" onclick="luSwitch(${m.id},this)">${m.icon}${m.name}</button>`
  ).join('');
}
function luSwitch(id,el){luAct=id;document.querySelectorAll('#lu-tabs .tab-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderLuCon();}
function renderLuCon(){
  const m=G.party.find(x=>x.id===luAct);if(!m) return;
  const tp=luTmp[m.id];const spent=sum(Object.values(tp));const rem=m.pendingPoints-spent;
  const SI=[{k:'str',l:'力',d:'攻撃力・物理ダメージ'},{k:'mag',l:'魔力',d:'魔法攻撃・MPの最大値'},{k:'vit',l:'体力',d:'HPの最大値・防御力'},{k:'spd',l:'速度',d:'回避率・命中率'},{k:'lck',l:'運',d:'クリティカル・運全般'}];
  const j=JOBS[m.jobKey];
  document.getElementById('lu-content').innerHTML=`<div class="lu-rem">割り振り可能ポイント: <strong style="color:#c9a227;font-size:18px">${rem}</strong></div>
    <button class="auto-btn" onclick="luAuto()">職業自動割り振り (${j?j.name:''}推奨)</button>
    ${SI.map(s=>`<div class="lu-row"><span class="lu-name">${s.l}</span><span class="lu-desc">${s.d}</span>
      <button class="lu-btn" onclick="luAdj('${s.k}',-1)" ${tp[s.k]<=0?'disabled':''}>-</button>
      <span class="lu-val">${m.stats[s.k]+tp[s.k]}</span>
      <button class="lu-btn" onclick="luAdj('${s.k}',1)" ${rem<=0?'disabled':''}>+</button>
    </div>`).join('')}`;
}
function luAdj(k,d){const m=G.party.find(x=>x.id===luAct);const tp=luTmp[m.id];const rem=m.pendingPoints-sum(Object.values(tp));if(d>0&&rem<=0)return;if(d<0&&tp[k]<=0)return;tp[k]+=d;renderLuCon();}
function luAuto(){const m=G.party.find(x=>x.id===luAct);const tp=luTmp[m.id];Object.keys(tp).forEach(k=>tp[k]=0);const j=JOBS[m.jobKey];if(!j) return;let r=m.pendingPoints;while(r>0){const s=Object.entries(j.auto).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);for(const[k]of s){if(r<=0)break;tp[k]++;r--;}if(!s.length){tp['str']++;r--;}}renderLuCon();}
function confirmLu(){
  G.party.forEach(m=>{const tp=luTmp[m.id];if(!tp)return;Object.keys(tp).forEach(k=>m.stats[k]+=tp[k]);const sp=sum(Object.values(tp));m.pendingPoints=Math.max(0,m.pendingPoints-sp);const d=calcD(m);m.hp=Math.min(m.hp,d.maxHp);m.mp=Math.min(m.mp,d.maxMp);});
  closeM('m-lu');renderParty();updateBadges();saveState();
}

function openIsel(memberId,slot){
  eqActive=memberId;eqSlot=slot;
  const m=G.party.find(x=>x.id===memberId);
  const curUid=m.equip&&m.equip[slot];
  // Gather UIDs already equipped by OTHER party members (item uniqueness)
  const takenByOthers=new Set();
  G.party.forEach(pm=>{
    if(pm.id===memberId) return;
    SK.forEach(s=>{ if(pm.equip[s]!=null) takenByOthers.add(pm.equip[s]); });
  });
  // Show items in bag for this slot, excluding those equipped by other members
  const available=G.bag.filter(b=>
    b.type==='equip' && IDATA[b.id] && IDATA[b.id].slot===slot
    && (!takenByOthers.has(b.uid) || b.uid===curUid)
  );
  document.getElementById('isel-title').textContent=`${SLOTS[slot]} — ${m.name}`;
  const list=document.getElementById('isel-list');
  if(!available.length){list.innerHTML=`<div style="text-align:center;color:#5a4a3a;font-size:13px;padding:14px">このスロット用のアイテムがありません</div>`;openM('m-isel');return;}
  list.innerHTML=available.map(b=>{
    const item=IDATA[b.id];const isUnid=!b.identified;const isCur=b.uid===curUid;
    const rc=RARITY[item.r]?.c||'';
    return `<div class="irow ${isCur?'equipped':''} ${isUnid?'unidentified':''}" onclick="equipI(${b.uid})">
      <div><div class="iname ${isUnid?'unid-color':''}"><span class="${rc}">${isUnid?'❓ ???の'+SLOTS[slot]:item.icon+' '+item.n}</span> ${isCur?'<span style="color:#c9a227;font-size:10px">装備中</span>':''}</div>
      <div class="istats">${isUnid?'未鑑定（鑑定が必要）':istat(item)}</div></div>
      <div class="iact">${isCur?'✓':'装備'}</div>
    </div>`;
  }).join('');
  openM('m-isel');
}

  openBagModal();updateHdr();updateBadges();saveState();

function sellItem(uid){
  const b=G.bag.find(x=>x.uid===uid);if(!b) return;
  const item=IDATA[b.id];
  const baseVal={legendary:5000,rare:1000,uncommon:200,common:50}[item.r]||50;
  const val=Math.floor(baseVal*0.4);
  G.gold+=val;
  G.bag=G.bag.filter(x=>x.uid!==uid);

  G.party.forEach(m=>SK.forEach(s=>{if(m.equip[s]===uid) m.equip[s]=null;}));
  pushSys(`${item.n}を${val}Gで売却した。`);

}

function useConsumable(id){
  const b=G.bag.find(x=>x.type==='consumable'&&x.id===id);if(!b) return;
  const item=CDATA[id];
  if(id==='potion')       healParty(100,0);
  else if(id==='hi_potion') healParty(300,0);
  else if(id==='ether')   healParty(0,50);
  else if(id==='elixir')  healParty(9999,9999);
  else if(id==='antidote') curePoisoned();
  else if(id==='phoenix_down') reviveOne();
  else{pushSys(`${item.icon}${item.n}を使用した。`);return;}
  b.qty--;if(b.qty<=0) G.bag=G.bag.filter(x=>!(x.type==='consumable'&&x.id===id));
  pushSys(`${item.icon}${item.n}を使用した。`);
  renderParty();openBagModal();saveState();
}
function healParty(hp,mp){G.party.forEach(m=>{if(m.status==='dead') return;const d=calcD(m);m.hp=Math.min(d.maxHp,m.hp+hp);m.mp=Math.min(d.maxMp,m.mp+mp);});}
function curePoisoned(){G.party.forEach(m=>{if(m.status==='poisoned') m.status='normal';});}
function reviveOne(){const dead=G.party.find(m=>m.status==='dead'||m.hp<=0);if(!dead) return;dead.status='normal';const d=calcD(dead);dead.hp=Math.floor(d.maxHp*0.5);}

function townIdentify(){

// PHASE DETECTION FROM STORY TEXT (fallback when AI JSON is wrong)
const BATTLE_WORDS=['攻撃','敵','ゴブリン','モンスター','戦闘','戦う','迫','囲','倒','ダメージ','魔物','斬','魔法','呪文','討','逃'];
const TREASURE_WORDS=['宝箱','宝物','チェスト','財宝','鍵','宝'];
const STAIRS_WORDS=['階段','下の階','深層','降り','B2','B3','B4','B5'];
const TRANSFER_WORDS=['転移陣','魔法陣','ポータル','帰還','街へ'];

function detectPhaseFromText(story, sd){
  // If applyStatus already set a non-explore phase, trust it
  if(G.phase!=='explore') return;
  // Skip battle detection after player just sent battle actions (prevent re-trigger)
  if(G.skipBattleDetect){ return; }  // consumed in applyStatus
  // Only detect from text if sd had no event or had exploration event
  const ev=(sd?.event||'').toLowerCase();
  if(ev==='battle'||ev==='boss'||ev==='treasure'||ev==='stairs') return;

  const has=(words)=>words.some(w=>story.includes(w));
  if(has(BATTLE_WORDS)&&story.length>80){
    // Count battle indicators - need at least 3 to trigger (more strict)
    const count=BATTLE_WORDS.filter(w=>story.includes(w)).length;
    if(count>=3){
      G.phase='battle';
      G.party.forEach(m=>{
        if(m.status!=='dead'&&m.hp>0){
          const j=JOBS[m.jobKey];
          if(j?.name==='魔法使い') G.battleSel[m.id]='魔法';
          else if(j?.name==='僧侶') G.battleSel[m.id]='回復';
          else G.battleSel[m.id]='攻撃';
        }
      });
      updateQuickBar();
      return;
    }
  }
  if(has(TREASURE_WORDS)){G.phase='treasure';updateQuickBar();return;}
  if(has(STAIRS_WORDS)){G.phase='stairs';updateQuickBar();return;}
  if(has(TRANSFER_WORDS)){G.phase='transfer';updateQuickBar();return;}
}

async function sendMsg(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text||G.loading) return;
  if(!G.cfg.apiKey){pushSys('APIキー未設定。⚙から設定してください。');openSettings();return;}
  inp.value='';autoResize(inp);pushPlayer(text);setLoad(true);
  try{
    const callType = G.pendingCallType || (G.phase==='battle' ? 'battle' : 'story');
    G.pendingCallType = null;  // consume it
    const raw=await callApi(text, callType);
    hideTyping();
    const{story,sd}=parseResp(raw);
    if(story) G.inTown?pushTown(story):pushNarr(story);
    if(sd) applyStatus(sd);
    // Fallback: detect phase from story text if JSON event was missing or wrong
    if(!G.inTown) detectPhaseFromText(story||'', sd);
    saveState();
  }
  catch(e){hideTyping();pushSys(`エラー: ${e.message}`);}
  setLoad(false);
}

function getBase(){const c=G.cfg;if(c.provider==='custom') return(c.customUrl||'').replace(/\/$/,'');if(c.provider==='openrouter') return'https://openrouter.ai/api/v1';return'https://api.openai.com/v1';}

async function callApi(userText, callType='story'){
  showTyping();
  // Select model based on call type
  const model = callType==='battle'
    ? (G.cfg.battleModel||G.cfg.storyModel||DEFAULT_CFG.battleModel)
    : (G.cfg.storyModel||G.cfg.model||DEFAULT_CFG.storyModel);
  const ps=G.party.map(m=>{const d=calcD(m);return`ID${m.id}(${m.name})Lv${m.level} HP:${m.hp}/${d.maxHp} MP:${m.mp}/${d.maxMp} 状態:${m.status} ATK:${d.atk} DEF:${d.def}`;}).join('\n');
  const hist=G.messages.filter(m=>m.type==='player'||m.type==='narrator'||m.type==='town-narr').slice(-10).map(m=>({role:m.type==='player'?'user':'assistant',content:m.text}));
  const loc=G.inTown?`現在地: 街ドーンウォール`:`現在地: ダンジョンB${G.floor}F（最深: B${G.maxFloor}F）`;
  const sys=G.cfg.systemPrompt+`\n\n${loc}\nパーティ状態:\n${ps}\n所持金: ${G.gold}G\nバッグ内アイテム数: ${G.bag.length}`;
  const body={model,max_tokens:1200,temperature:0.88,messages:[{role:'system',content:sys},...hist,{role:'user',content:userText}]};
  // Google AI Studio doesn't allow custom headers (CORS preflight failure)
  // Only add OpenRouter-specific headers when using OpenRouter
  const headers={'Content-Type':'application/json','Authorization':`Bearer ${G.cfg.apiKey}`};
  if(G.cfg.provider==='openrouter'){
    headers['HTTP-Referer']=location.href;
    headers['X-Title']='Dungeon Chronicles';
  }
  const res=await fetch(`${getBase()}/chat/completions`,{method:'POST',headers,body:JSON.stringify(body)});
  if(!res.ok){
    let msg=`HTTP ${res.status}`;
    try{const d=await res.json();msg=d.error?.message||d.error?.code||d.message||JSON.stringify(d);}catch(_){}
    throw new Error(msg);
  }
  const data=await res.json();
  if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  return data.choices?.[0]?.message?.content||'';
}

function parseResp(raw){
  let sd=null;
  const fr=/```(?:json)?[ \t]*([\s\S]*?)(?:```|$)/g;let fm;
  while((fm=fr.exec(raw))!==null){try{const p=JSON.parse(fm[1].trim());if(p.status){sd=p.status;}}catch(_){}}
  let cleaned=raw.replace(/```(?:json)?[\s\S]*?(?:```|$)/g,'').trim();
  if(!sd){let depth=0,start=-1;for(let i=0;i<cleaned.length;i++){if(cleaned[i]==='{'){if(!depth)start=i;depth++;}else if(cleaned[i]==='}'){depth--;if(!depth&&start!==-1){try{const p=JSON.parse(cleaned.slice(start,i+1));if(p.status){sd=p.status;cleaned=(cleaned.slice(0,start)+cleaned.slice(i+1)).trim();break;}}catch(_){}start=-1;}}}}
  const story=cleaned.replace(/^[ \t]*[{}\[\],].*$/gm,'').replace(/\n{3,}/g,'\n\n').trim();
  return{story,sd};
}

function loadState(){
  try{
    // Migrate settings from old storage keys if current key has no data
    let raw = localStorage.getItem(SK_STORE);
    if(!raw){
      const OLD_KEYS=['dchrpg_v4','dchrpg_v3','dchrpg_v2','dchrpg_v1'];
      for(const ok of OLD_KEYS){
        const old=localStorage.getItem(ok);
        if(old){try{const od=JSON.parse(old);if(od.cfg&&od.cfg.apiKey){G.cfg={...DEFAULT_CFG,...od.cfg};pushSys('⚙ 旧データからAPI設定を引き継ぎました。');}}catch(_){}}
      }
      return;
    }
    const d=JSON.parse(raw);
    if(d.party?.length) G.party=d.party;if(d.messages?.length) G.messages=d.messages;
    if(d.floor) G.floor=d.floor;if(d.maxFloor) G.maxFloor=d.maxFloor;
    if(d.phase) G.phase=d.phase;if(d.battleSel) G.battleSel=d.battleSel;G.skipBattleDetect=false;
    if(d.gold!==undefined) G.gold=d.gold;if(d.inTown!==undefined) G.inTown=d.inTown;
    if(d.cfg) G.cfg={...DEFAULT_CFG,...d.cfg};
    if(d.bag) G.bag=d.bag;if(d.nextUid) G.nextUid=d.nextUid;
    G.party.forEach(m=>{
      if(!m.stats) m.stats={str:8,mag:5,vit:8,spd:6,lck:5};
      if(!m.equip) m.equip={rhand:null,lhand:null,head:null,armor:null,feet:null,acc:null};
      if(!m.jobKey) m.jobKey=JK[m.id]||'warrior';
      if(m.pendingPoints===undefined) m.pendingPoints=0;
      if(!m.level) m.level=1;if(m.exp===undefined) m.exp=0;if(!m.expNext) m.expNext=100;
    });
  }catch(_){}
}

// ================================================================
// UTILS
// ================================================================
function clamp(v){return Math.max(0,Math.min(100,v));}
function sum(arr){return arr.reduce((a,b)=>a+b,0);}
function handleKey(e){if(!('ontouchstart' in window)&&e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
</script>
