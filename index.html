<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DungeonRPG">
  <meta name="theme-color" content="#080810">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>⚔️ Dungeon Chronicles</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', 'Times New Roman', serif;
      background-color: #080810;
      color: #e8d5b7;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    /* ── LAYOUT ── */
    #app {
      height: 100svh;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── HEADER / TITLE BAR ── */
    #header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 4px;
      background-color: #0c0c18;
      border-bottom: 1px solid #3a2a1a;
      flex-shrink: 0;
    }
    .title-text {
      font-family: 'IM Fell English', 'Times New Roman', serif;
      font-size: 17px;
      color: #c9a227;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(201, 162, 39, 0.5);
    }
    .floor-badge {
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      color: #8a6a3a;
      letter-spacing: 1px;
    }
    #btn-settings {
      width: 36px;
      height: 36px;
      background: none;
      border: 1px solid #3a2a1a;
      border-radius: 6px;
      color: #8a6a3a;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-settings:active { background-color: #1a1828; }

    /* ── PARTY PANEL ── */
    #party-panel {
      background-color: #0c0c18;
      border-bottom: 2px solid #3a2a1a;
      padding: 8px 10px;
      flex-shrink: 0;
    }
    .party-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .member-card {
      background-color: #14121e;
      border: 1px solid #2e2040;
      border-radius: 8px;
      padding: 6px 6px 4px;
      position: relative;
      transition: border-color 0.3s;
    }
    .member-card.low-hp { border-color: #661122; }
    .member-card.dead {
      opacity: 0.45;
      filter: grayscale(80%);
    }
    .member-header {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 5px;
    }
    .member-icon { font-size: 13px; line-height: 1; flex-shrink: 0; }
    .member-name {
      font-family: 'IM Fell English', serif;
      font-size: 10px;
      color: #d4a84b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-wrap { margin-bottom: 3px; }
    .bar-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      color: #7a6a5a;
      margin-bottom: 2px;
    }
    .bar-track {
      height: 5px;
      background-color: #1e1c2c;
      border-radius: 3px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #7a0e0e, #c72222);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mp-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #0a0a7a, #1a5acc);
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hp-fill.danger { background: linear-gradient(90deg, #550505, #aa1111); }
    .status-chip {
      display: block;
      font-size: 7px;
      text-align: center;
      padding: 2px 3px;
      border-radius: 3px;
      margin-top: 3px;
      background-color: #1c2a18;
      color: #6aaa68;
      border: 1px solid #2a4028;
    }
    .status-chip.poisoned { background-color: #221430; color: #cc55cc; border-color: #441a55; }
    .status-chip.burned   { background-color: #2a1808; color: #dd7733; border-color: #553311; }
    .status-chip.frozen   { background-color: #0a1830; color: #55aadd; border-color: #1a3d66; }
    .status-chip.stunned  { background-color: #282216; color: #ddcc33; border-color: #5a4a10; }
    .status-chip.dead     { background-color: #1e0c0c; color: #aa3333; border-color: #440e0e; }

    /* ── CHAT AREA ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 60%, rgba(40, 20, 10, 0.3) 0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 85% 30%, rgba(15, 10, 40, 0.4) 0%, transparent 70%);
    }
    #chat-area::-webkit-scrollbar { width: 3px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: #3a2a1a; border-radius: 2px; }

    /* ── MESSAGES ── */
    .msg { display: flex; flex-direction: column; max-width: 90%; animation: msgIn 0.25s ease-out; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.narrator { align-self: flex-start; }
    .msg.player   { align-self: flex-end; }
    .msg.system   { align-self: center; max-width: 100%; }

    .msg-sender {
      font-family: 'IM Fell English', serif;
      font-size: 10px;
      color: #8a6a3a;
      margin-bottom: 3px;
      padding-left: 5px;
      letter-spacing: 1px;
    }
    .msg.player .msg-sender { text-align: right; padding-right: 5px; color: #4a6a9a; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.65;
    }
    .msg.narrator .msg-bubble {
      background-color: #131222;
      border: 1px solid #2e2040;
      border-left: 3px solid #c9a227;
      color: #ead6b8;
      font-style: italic;
    }
    .msg.player .msg-bubble {
      background-color: #121c30;
      border: 1px solid #243054;
      border-right: 3px solid #3a6acc;
      color: #bcd0ee;
      text-align: right;
    }
    .msg.system .msg-bubble {
      background: none;
      color: #7a6a5a;
      font-size: 12px;
      font-style: italic;
      text-align: center;
      padding: 3px 8px;
    }

    /* ── TYPING ── */
    .typing-wrap { display: flex; flex-direction: column; align-self: flex-start; }
    .typing-bubble {
      background-color: #131222;
      border: 1px solid #2e2040;
      border-left: 3px solid #c9a227;
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .tdot {
      width: 6px; height: 6px;
      background-color: #c9a227;
      border-radius: 50%;
      animation: tdot 1.3s infinite;
    }
    .tdot:nth-child(2) { animation-delay: 0.2s; }
    .tdot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%, 65%, 100% { transform: translateY(0); opacity: 0.4; }
      35% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── QUICK ACTIONS ── */
    #quick-bar {
      display: flex;
      gap: 6px;
      padding: 6px 12px 0;
      overflow-x: auto;
      flex-shrink: 0;
      background-color: #0c0c18;
      -webkit-overflow-scrolling: touch;
    }
    #quick-bar::-webkit-scrollbar { display: none; }
    .qbtn {
      font-family: 'IM Fell English', serif;
      font-size: 11px;
      white-space: nowrap;
      padding: 5px 10px;
      background-color: #14121e;
      border: 1px solid #2e2040;
      border-radius: 20px;
      color: #c9a227;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .qbtn:active { background-color: #1e1c30; border-color: #c9a227; }

    /* ── INPUT PANEL ── */
    #input-panel {
      background-color: #0c0c18;
      border-top: 2px solid #3a2a1a;
      padding: 10px 12px 12px;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      background-color: #14121e;
      border: 1px solid #2e2040;
      border-radius: 10px;
      color: #e8d5b7;
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      padding: 10px 14px;
      resize: none;
      min-height: 44px;
      max-height: 110px;
      outline: none;
      -webkit-appearance: none;
      line-height: 1.5;
    }
    #chat-input::placeholder { color: #4a3a2a; }
    #chat-input:focus { border-color: #c9a227; }
    #btn-send {
      width: 44px;
      height: 44px;
      background: linear-gradient(140deg, #8b6a10, #c9a227);
      border: none;
      border-radius: 10px;
      color: #080810;
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    #btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
    #btn-send:active:not(:disabled) { opacity: 0.75; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(4, 4, 12, 0.9);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 0 env(safe-area-inset-bottom, 0px);
    }
    #modal-overlay.hidden { display: none; }
    .modal-sheet {
      background-color: #0e0e1c;
      border: 1px solid #3a2a1a;
      border-top: 2px solid #c9a227;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px 18px 24px;
      -webkit-overflow-scrolling: touch;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background-color: #3a2a1a;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-title {
      font-family: 'IM Fell English', serif;
      font-size: 20px;
      color: #c9a227;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 18px;
      text-shadow: 0 0 10px rgba(201, 162, 39, 0.4);
    }
    .form-section {
      margin-bottom: 16px;
    }
    .form-label {
      font-family: 'IM Fell English', serif;
      font-size: 13px;
      color: #c9a227;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .form-hint { font-size: 11px; color: #5a4a3a; margin-top: 4px; }
    .f-input {
      width: 100%;
      background-color: #14121e;
      border: 1px solid #2e2040;
      border-radius: 8px;
      color: #e8d5b7;
      font-family: 'Crimson Pro', serif;
      font-size: 16px;
      padding: 10px 12px;
      outline: none;
      -webkit-appearance: none;
    }
    .f-input:focus { border-color: #c9a227; }
    select.f-input { cursor: pointer; }
    textarea.f-input { resize: vertical; line-height: 1.5; }
    .party-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    .party-row-icon { width: 52px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }
    .btn-ok {
      flex: 1;
      background: linear-gradient(140deg, #8b6a10, #c9a227);
      color: #080810;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'IM Fell English', serif;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .btn-cancel {
      flex: 1;
      background: none;
      color: #7a6a5a;
      border: 1px solid #3a2a1a;
      border-radius: 10px;
      padding: 13px;
      font-family: 'IM Fell English', serif;
      font-size: 15px;
      cursor: pointer;
    }
    .danger-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: #883333;
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 16px;
      font-family: 'Crimson Pro', serif;
      text-decoration: underline;
    }
    .divider {
      height: 1px;
      background-color: #2e2040;
      margin: 16px 0;
    }
  </style>

</head>

<script>
// ================================================================
//  DEFAULTS
// ================================================================
const DEFAULT_PARTY = [
  { id: 0, name: '戦士',   icon: '⚔️',  hp: 120, maxHp: 120, mp: 30,  maxMp: 30,  status: 'normal' },
  { id: 1, name: '魔法使い', icon: '🧙',  hp: 70,  maxHp: 70,  mp: 110, maxMp: 110, status: 'normal' },
  { id: 2, name: '僧侶',   icon: '✨',  hp: 90,  maxHp: 90,  mp: 90,  maxMp: 90,  status: 'normal' },
  { id: 3, name: '盗賊',   icon: '🗡️', hp: 80,  maxHp: 80,  mp: 50,  maxMp: 50,  status: 'normal' }
];

const DEFAULT_SYSPROMPT = `あなたはダンジョンRPGの熟練したゲームマスターです。
4人のパーティがダンジョンを探索しています。
プレイヤーの行動に対し、緊張感ある物語と臨場感のある描写で応答してください。

パーティの構成:
- ID0: 戦士（タンク、高HP・物理攻撃担当）
- ID1: 魔法使い（低HP・高MP、強力な魔法）
- ID2: 僧侶（回復・補助魔法）
- ID3: 盗賊（罠解除・素早い攻撃）

【必須】毎回のレスポンス末尾に必ず以下のJSON形式でステータスを更新してください：

\`\`\`json
{
  "status": {
    "party": [
      {"id": 0, "hp": 120, "maxHp": 120, "mp": 30,  "maxMp": 30,  "status": "normal"},
      {"id": 1, "hp": 70,  "maxHp": 70,  "mp": 110, "maxMp": 110, "status": "normal"},
      {"id": 2, "hp": 90,  "maxHp": 90,  "mp": 90,  "maxMp": 90,  "status": "normal"},
      {"id": 3, "hp": 80,  "maxHp": 80,  "mp": 50,  "maxMp": 50,  "status": "normal"}
    ],
    "floor": 1,
    "event": "exploration"
  }
}
\`\`\`

status値: normal / poisoned / burned / frozen / stunned / dead
event値: exploration / battle / treasure / boss / rest / trap`;

const DEFAULT_SETTINGS = {
  provider: 'openrouter',
  customUrl: '',
  apiKey: '',
  model: 'anthropic/claude-3-haiku',
  systemPrompt: DEFAULT_SYSPROMPT
};

const PROVIDER_URLS = {
  openrouter: 'https://openrouter.ai/api/v1',
  openai:     'https://api.openai.com/v1'
};

const STORAGE_KEY = 'dchrpg_v1';

// ================================================================
//  STATE
// ================================================================
let state = {
  party:    JSON.parse(JSON.stringify(DEFAULT_PARTY)),
  messages: [],
  floor:    1,
  loading:  false,
  settings: { ...DEFAULT_SETTINGS }
};

// ================================================================
//  INIT
// ================================================================
function init() {
  loadState();
  renderParty();
  renderAllMessages();
  if (state.messages.length === 0) {
    pushSysMsg('⚙️ APIキーを設定して冒険を始めよう！右上の⚙️から設定できます。');
    pushNarratorMsg(
      '闇に沈むダンジョンの入口。湿った石の匂いと、遠くから聞こえる不気味な唸り声——\n\n' +
      '松明の炎が4人の冒険者たちの顔を照らし出す。\n\n' +
      '「ここから先、退路はない」と戦士は低く呟いた。\n\n' +
      '——さあ、何をする？',
      false
    );
    saveState();
  }
  if (!state.settings.apiKey) setTimeout(openSettings, 600);
  registerSW();
}

// ================================================================
//  PARTY RENDERING
// ================================================================
const STATUS_LABELS = {
  normal:   '✅ 正常',
  poisoned: '☠️ 毒',
  burned:   '🔥 炎上',
  frozen:   '❄️ 氷結',
  stunned:  '💫 スタン',
  dead:     '💀 戦闘不能'
};

function renderParty() {
  const grid = document.getElementById('party-grid');
  grid.innerHTML = state.party.map(m => {
    const hpPct  = Math.max(0, Math.min(100, (m.hp / m.maxHp) * 100));
    const mpPct  = Math.max(0, Math.min(100, (m.mp / m.maxMp) * 100));
    const isDead = m.status === 'dead' || m.hp <= 0;
    const isLow  = hpPct < 30 && !isDead;
    return `
      <div class="member-card ${isDead ? 'dead' : ''} ${isLow ? 'low-hp' : ''}">
        <div class="member-header">
          <span class="member-icon">${m.icon}</span>
          <span class="member-name">${esc(m.name)}</span>
        </div>
        <div class="bar-wrap">
          <div class="bar-label-row"><span>HP</span><span>${m.hp}/${m.maxHp}</span></div>
          <div class="bar-track">
            <div class="hp-fill ${isLow ? 'danger' : ''}" style="width:${hpPct}%"></div>
          </div>
        </div>
        <div class="bar-wrap">
          <div class="bar-label-row"><span>MP</span><span>${m.mp}/${m.maxMp}</span></div>
          <div class="bar-track">
            <div class="mp-fill" style="width:${mpPct}%"></div>
          </div>
        </div>
        <span class="status-chip ${m.status !== 'normal' ? m.status : ''}">${STATUS_LABELS[m.status] || m.status}</span>
      </div>`;
  }).join('');

  document.getElementById('floor-badge').textContent = `B${state.floor}F`;
}

function applyStatusUpdate(statusData) {
  if (!statusData || !Array.isArray(statusData.party)) return;
  statusData.party.forEach(upd => {
    const m = state.party.find(x => x.id === upd.id);
    if (!m) return;
    if (upd.maxHp !== undefined) m.maxHp = upd.maxHp;
    if (upd.maxMp !== undefined) m.maxMp = upd.maxMp;
    if (upd.hp    !== undefined) m.hp    = Math.max(0, Math.min(upd.hp, m.maxHp));
    if (upd.mp    !== undefined) m.mp    = Math.max(0, Math.min(upd.mp, m.maxMp));
    if (upd.status) m.status = upd.status;
  });
  if (statusData.floor) state.floor = statusData.floor;
  renderParty();
}

// ================================================================
//  MESSAGE MANAGEMENT
// ================================================================
function pushNarratorMsg(text, save = true) {
  const m = { type: 'narrator', text, ts: Date.now() };
  state.messages.push(m);
  appendMsgEl(m);
  scrollBottom();
  if (save) saveState();
}
function pushPlayerMsg(text) {
  const m = { type: 'player', text, ts: Date.now() };
  state.messages.push(m);
  appendMsgEl(m);
  scrollBottom();
  saveState();
}
function pushSysMsg(text) {
  const m = { type: 'system', text, ts: Date.now() };
  state.messages.push(m);
  appendMsgEl(m);
  scrollBottom();
}

function appendMsgEl(m) {
  const area  = document.getElementById('chat-area');
  const outer = document.createElement('div');
  outer.className = `msg ${m.type}`;

  if (m.type === 'narrator') {
    outer.innerHTML = `<div class="msg-sender">📖 ゲームマスター</div>
      <div class="msg-bubble">${esc(m.text).replace(/\n/g, '<br>')}</div>`;
  } else if (m.type === 'player') {
    outer.innerHTML = `<div class="msg-sender">🛡️ パーティ</div>
      <div class="msg-bubble">${esc(m.text).replace(/\n/g, '<br>')}</div>`;
  } else {
    outer.innerHTML = `<div class="msg-bubble">${esc(m.text)}</div>`;
  }
  area.appendChild(outer);
}

function renderAllMessages() {
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  state.messages.forEach(appendMsgEl);
  scrollBottom();
}

function scrollBottom() {
  const area = document.getElementById('chat-area');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 60);
}

// ================================================================
//  TYPING INDICATOR
// ================================================================
let typingEl = null;
function showTyping() {
  const area = document.getElementById('chat-area');
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = `<div class="msg-sender">📖 ゲームマスター</div>
    <div class="typing-bubble">
      <div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>
    </div>`;
  area.appendChild(typingEl);
  scrollBottom();
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ================================================================
//  API CALL
// ================================================================
async function sendMessage() {
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || state.loading) return;

  if (!state.settings.apiKey) {
    pushSysMsg('⚠️ APIキーが未設定です。⚙️ボタンから設定してください。');
    openSettings();
    return;
  }

  inp.value = '';
  autoResize(inp);
  pushPlayerMsg(text);
  setLoading(true);

  try {
    const raw         = await callApi(text);
    hideTyping();
    const { story, statusData } = parseAiResponse(raw);
    pushNarratorMsg(story);
    if (statusData) applyStatusUpdate(statusData);
    saveState();
  } catch (err) {
    hideTyping();
    pushSysMsg(`⚠️ エラー: ${err.message}`);
  }

  setLoading(false);
}

function getEndpointBase() {
  const s = state.settings;
  if (s.provider === 'custom') return (s.customUrl || '').replace(/\/$/, '');
  return PROVIDER_URLS[s.provider] || PROVIDER_URLS.openrouter;
}

async function callApi(userText) {
  showTyping();

  // Build history (last 12 user/assistant turns for context)
  const histMsgs = state.messages
    .filter(m => m.type === 'player' || m.type === 'narrator')
    .slice(-12)
    .map(m => ({ role: m.type === 'player' ? 'user' : 'assistant', content: m.text }));

  const body = {
    model: state.settings.model,
    max_tokens: 1200,
    temperature: 0.88,
    messages: [
      { role: 'system', content: state.settings.systemPrompt },
      ...histMsgs,
      { role: 'user', content: userText }
    ]
  };

  const headers = {
    'Content-Type':  'application/json',
    'Authorization': `Bearer ${state.settings.apiKey}`,
    'HTTP-Referer':  location.href,
    'X-Title':       'Dungeon Chronicles RPG'
  };

  const res = await fetch(`${getEndpointBase()}/chat/completions`, {
    method: 'POST',
    headers,
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const d = await res.json(); msg = d.error?.message || msg; } catch (_) {}
    throw new Error(msg);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

function parseAiResponse(raw) {
  let statusData = null;
  let story      = raw;

  const match = raw.match(/```json\s*([\s\S]*?)\s*```/);
  if (match) {
    try {
      const parsed = JSON.parse(match[1]);
      statusData = parsed.status || null;
    } catch (_) {}
    story = raw.replace(/```json[\s\S]*?```/g, '').trim();
  }

  return { story, statusData };
}

function setLoading(v) {
  state.loading = v;
  document.getElementById('btn-send').disabled = v;
}

function quickAction(action) {
  const inp = document.getElementById('chat-input');
  inp.value = action;
  autoResize(inp);
  sendMessage();
}

// ================================================================
//  INPUT UTILS
// ================================================================
function handleKeyDown(e) {
  // Desktop Enter = send; Shift+Enter = newline; mobile always newline
  const isMobile = 'ontouchstart' in window;
  if (!isMobile && e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// ================================================================
//  SETTINGS MODAL
// ================================================================
function openSettings() {
  const s = state.settings;
  document.getElementById('sel-provider').value    = s.provider;
  document.getElementById('inp-custom-url').value  = s.customUrl;
  document.getElementById('inp-apikey').value      = s.apiKey;
  document.getElementById('inp-model').value       = s.model;
  document.getElementById('inp-sysprompt').value   = s.systemPrompt;
  onProviderChange();
  renderPartyConfigForm();
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
}

function onProviderChange() {
  const v = document.getElementById('sel-provider').value;
  document.getElementById('grp-custom').style.display = v === 'custom' ? 'block' : 'none';
  const hints = {
    openrouter: '例: anthropic/claude-3-haiku, meta-llama/llama-3.3-70b-instruct',
    openai:     '例: gpt-4o, gpt-4o-mini, gpt-3.5-turbo',
    custom:     'ご利用のモデル名を入力'
  };
  document.getElementById('model-hint').textContent = hints[v] || '';
}

function renderPartyConfigForm() {
  const list = document.getElementById('party-config-list');
  list.innerHTML = state.party.map((m, i) => `
    <div class="party-row">
      <input type="text" class="f-input party-row-icon" id="pcfg-icon-${i}" value="${esc(m.icon)}" maxlength="4">
      <input type="text" class="f-input" id="pcfg-name-${i}" value="${esc(m.name)}" placeholder="名前">
      <input type="number" class="f-input" id="pcfg-maxhp-${i}" value="${m.maxHp}" min="1" max="9999" style="width:72px;" title="MaxHP">
      <input type="number" class="f-input" id="pcfg-maxmp-${i}" value="${m.maxMp}" min="0" max="9999" style="width:72px;" title="MaxMP">
    </div>`).join('');
}

function saveSettings() {
  // Gather party config
  state.party.forEach((m, i) => {
    const icon  = document.getElementById(`pcfg-icon-${i}`)?.value.trim();
    const name  = document.getElementById(`pcfg-name-${i}`)?.value.trim();
    const maxHp = parseInt(document.getElementById(`pcfg-maxhp-${i}`)?.value) || m.maxHp;
    const maxMp = parseInt(document.getElementById(`pcfg-maxmp-${i}`)?.value) || m.maxMp;
    if (icon) m.icon = icon;
    if (name) m.name = name;
    m.maxHp = maxHp;
    m.maxMp = maxMp;
    m.hp = Math.min(m.hp, maxHp);
    m.mp = Math.min(m.mp, maxMp);
  });

  state.settings = {
    provider:     document.getElementById('sel-provider').value,
    customUrl:    document.getElementById('inp-custom-url').value.trim(),
    apiKey:       document.getElementById('inp-apikey').value.trim(),
    model:        document.getElementById('inp-model').value.trim() || DEFAULT_SETTINGS.model,
    systemPrompt: document.getElementById('inp-sysprompt').value || DEFAULT_SYSPROMPT
  };

  renderParty();
  saveState();
  closeSettings();

  if (state.settings.apiKey) {
    pushSysMsg('✅ 設定を保存しました。冒険を続けよう！');
  } else {
    pushSysMsg('⚠️ APIキーが未入力です。設定から入力してください。');
  }
}

function confirmReset() {
  if (confirm('本当にリセットしますか？\nすべての進行データが削除されます。')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// ================================================================
//  LOCAL STORAGE
// ================================================================
function saveState() {
  try {
    const data = {
      party:    state.party,
      messages: state.messages.slice(-60),
      floor:    state.floor,
      settings: state.settings
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (_) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (Array.isArray(d.party)    && d.party.length)    state.party    = d.party;
    if (Array.isArray(d.messages) && d.messages.length) state.messages = d.messages;
    if (d.floor)    state.floor    = d.floor;
    if (d.settings) state.settings = { ...DEFAULT_SETTINGS, ...d.settings };
  } catch (_) {}
}

// ================================================================
//  SERVICE WORKER
// ================================================================
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// ================================================================
//  UTILITY
// ================================================================
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ================================================================
//  BOOT
// ================================================================
init();
</script>
